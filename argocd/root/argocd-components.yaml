apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: 'https://github.com/khaipd18/Development-and-Deployment-of-a-Housing-Price-Prediction-System-using-MLOps-GitOps.git' 
    targetRevision: HEAD 
    path: argocd 
    directory:
      recurse: true  
      exclude: "root/*" 
      
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd 
    
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true  
    syncOptions:
      - CreateNamespace=true